run_scope: full

competition:
  name: store-sales-time-series-forecasting
  url: https://www.kaggle.com/competitions/store-sales-time-series-forecasting
  metric: rmsle
  target: sales
  id_col: id

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

data:
  train_file: train.csv
  test_file: test.csv
  stores_file: stores.csv
  oil_file: oil.csv
  holidays_file: holidays_events.csv
  transactions_file: transactions.csv
  sample_submission: sample_submission.csv

features:
  drop_cols:
    - id
    - sales
    - log_sales
    - city
    - state
    - store_type
    - cluster
    - transactions  # not known for the 16-day test horizon
  # Numeric date features (month, dayofweek, …) impose a *linear* effect on
  # sales, which is mis-specified for cyclical seasonality.  Fourier sin/cos
  # pairs below capture the cycles properly, so raw date features are dropped
  # to avoid the mis-specification (and time_step trend extrapolation).
  date_features: []
  lag_features:
    - [log_sales, [1, 7, 14, 28]]
  rolling_features:
    - col: log_sales
      windows: [7]
      aggs: [mean]
  # Cyclical seasonality via Fourier pairs (period, harmonics).
  fourier_features:
    dayofyear: [1, 2, 3]
    dayofweek: [1, 2]
  date_col: date
  store_col: store_nbr
  family_col: family
  onpromotion_col: onpromotion

model:
  type: linear
  linear_type: ridge
  target_transform: log1p
  alpha: 1.0
  fit_intercept: true

timeseries:
  test_period_days: 16
  min_train_date: "2013-01-01"
  max_train_date: "2017-08-15"
