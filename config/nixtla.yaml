competition:
  name: store-sales-time-series-forecasting
  url: https://www.kaggle.com/competitions/store-sales-time-series-forecasting
  metric: rmsle
  target: sales
  id_col: id

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

# Nixtla statistical baseline (SeasonalNaive + Theta + AutoETS).
# Fast, no exogenous features — pure univariate per store-family series.
nixtla:
  kind: stats
  freq: D
  horizon: 16
  season_length: 7
  n_jobs: -1
  models:
    - name: SeasonalNaive
      alias: SeasonalNaive
      season_length: 7
    - name: Theta
      alias: Theta
      season_length: 7
    - name: AutoETS
      alias: AutoETS
      season_length: 7
      model: ZZZ
  cv:
    n_windows: 1
    step_size: 16

timeseries:
  test_period_days: 16
  min_train_date: "2013-01-01"
  max_train_date: "2017-08-15"
