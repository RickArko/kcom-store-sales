run_scope: full

competition:
  name: store-sales-time-series-forecasting
  metric: rmsle
  target: sales
  id_col: id

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

data:
  train_file: train.csv
  test_file: test.csv
  stores_file: stores.csv
  oil_file: oil.csv
  holidays_file: holidays_events.csv
  transactions_file: transactions.csv
  sample_submission: sample_submission.csv

toto:
  model_name: Datadog/Toto-2.0-22m
  horizon: 16
  decode_block_size: 768
  val_days: 16
  context_length: 512
  variate_batch_size: null
  log_transform: true       # log + short context

timeseries:
  test_period_days: 16
  min_train_date: "2013-01-01"
  max_train_date: "2017-08-15"
