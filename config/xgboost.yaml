run_scope: full

competition:
  name: store-sales-time-series-forecasting
  url: https://www.kaggle.com/competitions/store-sales-time-series-forecasting
  metric: rmsle
  target: sales
  id_col: id

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

data:
  train_file: train.csv
  test_file: test.csv
  stores_file: stores.csv
  oil_file: oil.csv
  holidays_file: holidays_events.csv
  transactions_file: transactions.csv
  sample_submission: sample_submission.csv

features:
  drop_cols:
    - id
  date_features:
    - year
    - month
    - dayofweek
    - dayofmonth
    - quarter
    - weekofyear
  lag_features:
    - [sales, [1, 7, 14, 28]]
  rolling_features:
    - col: sales
      windows: [7, 14, 28]
      aggs: [mean, std]
  date_col: date
  store_col: store_nbr
  family_col: family
  onpromotion_col: onpromotion

preprocessing:
  trim_pre_activation_zeros: false

model:
  type: xgboost
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 8
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

timeseries:
  test_period_days: 16
  min_train_date: "2013-01-01"
  max_train_date: "2017-08-15"
  cv_windows: [30, 60, 90]
