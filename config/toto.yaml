run_scope: full

competition:
  name: store-sales-time-series-forecasting
  url: https://www.kaggle.com/competitions/store-sales-time-series-forecasting
  metric: rmsle
  target: sales
  id_col: id

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

data:
  train_file: train.csv
  test_file: test.csv
  stores_file: stores.csv
  oil_file: oil.csv
  holidays_file: holidays_events.csv
  transactions_file: transactions.csv
  sample_submission: sample_submission.csv

toto:
  model_name: Datadog/Toto-2.0-22m
  horizon: 16
  decode_block_size: null   # single pass (horizon=16 ≤ patch_size=32 → 1 patch)
  val_days: 16              # held-out validation period length
  # --- Tuned parameters (see config/experiments/toto-*.yaml for ablations) ---
  context_length: 768       # last 768 days as lookback (best val_rmsle=0.4597)
  variate_batch_size: 256   # chunk variates for memory safety (no accuracy impact)
  log_transform: false      # log1p hurts (TOTO has internal normalization)

timeseries:
  test_period_days: 16
  min_train_date: "2013-01-01"
  max_train_date: "2017-08-15"
